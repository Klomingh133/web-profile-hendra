<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil Modern - Komang Hendra Dinata</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #2c3e50;
      --secondary: #3498db;
      --accent: #e74c3c;
      --light: #ecf0f1;
      --dark: #2c3e50;
      --text: #34495e;
      --text-light: #7f8c8d;
      --card-bg: rgba(255, 255, 255, 0.95);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      --transition: all 0.3s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: url('backgronn.png') no-repeat center center fixed;
      background-size: cover;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: img url('a:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><rect fill="rgba(255,255,255,0.05)" x="0" y="0" width="20" height="20"/><rect fill="rgba(255,255,255,0.05)" x="20" y="20" width="20" height="20"/></svg>');
      background-size: 40px 40px;
      z-index: -1;
      opacity: 0.3;
    }

    .container {
      display: flex;
      max-width: 1200px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
      z-index: 1;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .profile-section {
      flex: 1;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(to bottom, var(--primary), #1a2a6c);
      color: white;
      position: relative;
    }

    .profile-section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none"><circle cx="10" cy="10" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="30" cy="30" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="70" cy="70" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="90" cy="90" r="1" fill="rgba(255,255,255,0.1)"/></svg>');
      background-size: 40px 40px;
      opacity: 0.3;
    }

    .profile-pic {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 5px solid rgba(255, 255, 255, 0.2);
      overflow: hidden;
      margin-bottom: 30px;
      position: relative;
      z-index: 2;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      transition: var(--transition);
      background: linear-gradient(45deg, #3498db, #2c3e50);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 16px;
      text-align: center;
      padding: 20px;
    }

    .profile-pic:hover {
      transform: scale(1.05);
      border-color: var(--secondary);
    }

    .profile-pic img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
    }

    .name {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .title {
      font-size: 18px;
      font-weight: 400;
      color: var(--secondary);
      margin-bottom: 30px;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .description {
      font-size: 16px;
      line-height: 1.8;
      text-align: center;
      max-width: 400px;
      margin-bottom: 40px;
      position: relative;
      z-index: 2;
      color: rgba(255, 255, 255, 0.9);
    }

    .image-gallery {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .gallery-item {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.3);
      position: relative;
      transition: var(--transition);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .gallery-item:hover {
      transform: scale(1.1);
      border-color: var(--secondary);
      box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
      z-index: 3;
    }

    .gallery-item a {
      display: block;
      width: 100%;
      height: 100%;
      position: relative;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 10px;
      transform: translateY(100%);
      transition: var(--transition);
      opacity: 0;
      pointer-events: none;
    }

    .gallery-item:hover .gallery-caption {
      transform: translateY(0);
      opacity: 1;
    }

    .nav-section {
      flex: 0 0 300px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px;
      background: var(--card-bg);
      position: relative;
    }

    .nav-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 40px;
      color: var(--primary);
      text-align: center;
      position: relative;
    }

    .nav-title::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: var(--secondary);
      border-radius: 2px;
    }

    .nav-links {
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 18px 25px;
      background: white;
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-size: 18px;
      font-weight: 500;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      transition: var(--transition);
      border: 2px solid transparent;
    }

    .nav-link i {
      margin-right: 15px;
      font-size: 20px;
      width: 30px;
      text-align: center;
      color: var(--secondary);
    }

    .nav-link:hover {
      transform: translateX(10px);
      border-color: var(--secondary);
      box-shadow: 0 8px 20px rgba(52, 152, 219, 0.2);
    }

    .nav-link.active {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      color: white;
      border-color: var(--secondary);
    }

    .nav-link.active i {
      color: white;
    }

    .watermark {
      position: absolute;
      bottom: 20px;
      right: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      z-index: 2;
    }

    .school-link {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: var(--secondary);
      font-size: 14px;
      text-decoration: none;
      transition: var(--transition);
      z-index: 2;
    }

    .school-link:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    @media (max-width: 900px) {
      .container {
        flex-direction: column;
      }
      
      .nav-section {
        flex: 0 0 auto;
        padding: 30px;
      }
      
      .profile-section {
        padding: 40px 20px;
      }
      
      .nav-links {
        flex-direction: row;
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .nav-link {
        flex: 1;
        min-width: 200px;
      }
      
      .school-link {
        position: relative;
        bottom: auto;
        left: auto;
        margin-top: 20px;
        text-align: center;
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .profile-pic {
        width: 180px;
        height: 180px;
      }
      
      .name {
        font-size: 26px;
      }
      
      .nav-link {
        padding: 15px;
        font-size: 16px;
      }
      
      .gallery-item {
        width: 80px;
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-section">
      <div class="profile-pic">
        <img src="muka.jpg" alt="Komang Hendra Dinata">
      </div>
      <h1 class="name">Komang Hendra Dinata</h1>
      <div class="title">Siswa SMK Negeri 1 Denpasar</div>
      <p class="description">Selamat datang di website saya, ini adalah halaman website pribadi saya yang berisi info-info pribadi milik saya, silahkan klik menu di samping untuk melihat info pribadi saya.</p>
      
      <div class="image-gallery">
        <div class="gallery-item">
          <a href="https://www.smkn1denpasar.sch.id/" target="_blank" title="Kunjungi Website SMKN 1 Denpasar">
            <img src="SKENSAJAYA.png" alt="Logo SMKN 1 Denpasar">
            <div class="gallery-caption">SCHOOL</div>
          </a>
        </div>
      </div>
      
      <div class="watermark">Oming</div>
      <a href="https://www.smkn1denpasar.sch.id/" target="_blank" class="school-link">www.smkn1denpasar.sch.id</a>
    </div>
    
    <div class="nav-section">
      <h2 class="nav-title">MENU</h2>
      <div class="nav-links">
        <a href="index.html" class="nav-link active">
          <i class="fas fa-home"></i> HOME
        </a>
        <a href="About.html" class="nav-link">
          <i class="fas fa-user"></i> ABOUT ME
        </a>
        <a href="Contact.html" class="nav-link">
          <i class="fas fa-envelope"></i> CONTACT ME
        </a>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('mouseenter', function() {
        this.style.transform = 'translateX(10px)';
      });
      
      link.addEventListener('mouseleave', function() {
        this.style.transform = 'translateX(0)';
      });
    });
    
    const currentPage = window.location.pathname.split('/').pop();
    document.querySelectorAll('.nav-link').forEach(link => {
      if (link.getAttribute('href') === currentPage) {
        link.classList.add('active');
      } else {
        link.classList.remove('active');
      }
    });
    
    document.querySelectorAll('.gallery-item').forEach(item => {
      item.addEventListener('mouseenter', function() {
        this.style.transform = 'scale(1.1)';
      });
      
      item.addEventListener('mouseleave', function() {
        this.style.transform = 'scale(1)';
      });
    });
    
    const schoolLogo = document.querySelector('.gallery-item');
    schoolLogo.addEventListener('click', function() {
      this.style.transform = 'scale(0.9)';
      setTimeout(() => {
        this.style.transform = 'scale(1.1)';
      }, 200);
    });
  </script>
</body>
</html>
